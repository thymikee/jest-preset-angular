name: Publish Package 🚀

on:
  workflow_run:
    workflows:
      - Tag release 🏷️
    branches:
      - main
      - next
    types:
      - completed

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 20
          fetch-tags: false

      - name: Setup Node version ⚙️
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: yarn
          cache-dependency-path: 'yarn.lock'
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build 🔨
        run: yarn build

      - name: Check release tag 🔖
        id: tag_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG exists on origin"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist on origin"
          fi

      - name: Publish package 🚀
        if: steps.tag_check.outputs.tag_exists == 'true'
        run: npm publish

      - name: Skip publish (tag missing) ℹ️
        if: steps.tag_check.outputs.tag_exists != 'true'
        run: echo "Skipping publish because tag ${{ steps.tag_check.outputs.tag_name }} was not found on origin."

